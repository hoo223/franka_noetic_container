#!/usr/bin/env python
PACKAGE = "franka_example_controllers"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

gen.add("translational_stiffness", double_t, 0, "Cartesian translational stiffness", 1500, 0, 3000)
gen.add("auto_translational_damping", bool_t, 0, "Automatically compute translational damping from translational stiffness", True)
gen.add("translational_damping", double_t, 0, "Cartesian translational damping", 0, 0, 200)
gen.add("rotational_stiffness", double_t, 0, "Cartesian rotational stiffness", 80, 0, 100)
gen.add("auto_rotational_damping", bool_t, 0, "Automatically compute rotational damping from rotational stiffness", False)
gen.add("rotational_damping", double_t, 0, "Cartesian rotational damping", 0, 0, 200)
gen.add("nullspace_stiffness", double_t, 0, "Stiffness of the joint space nullspace controller (the desired configuration is the one at startup)", 0.5, 0, 100)

exit(gen.generate(PACKAGE, "dynamic_compliance", "compliance_param"))
